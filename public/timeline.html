<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your timeline · privbook</title>
    <link rel="icon" type="image/webp" href="/privbook_logo.webp">
    <link rel="apple-touch-icon" href="/privbook_logo.webp">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="text/javascript">
        window.__ENV__ = { CLERK_PUBLISHABLE_KEY: '{{CLERK_PUBLISHABLE_KEY}}', API_BASE: '{{API_BASE}}' };
    </script>
    <script async crossorigin="anonymous"
        data-clerk-publishable-key="{{CLERK_PUBLISHABLE_KEY}}"
        src="{{CLERK_JS_URL}}"
        type="text/javascript"></script>
    <script defer src="/js/toast.js"></script>
    <script defer src="/js/api.js"></script>
    <script defer src="/js/auth-guard.js"></script>
    <script defer src="/js/scroll-lock.js"></script>
    <script defer src="/js/date-picker.js"></script>
    <script defer src="/js/book-picker.js"></script>
    <script defer src="/js/books-strip.js"></script>
    <script defer src="/js/composer.js"></script>
    <script defer src="/js/lightbox.js"></script>
    <script defer src="/js/timeline.js"></script>
</head>

<body>
    <div class="app-shell">
        <header class="site-header">
            <div class="site-header-inner">
                <a href="/timeline" class="brand" style="text-decoration: none;">
                    <span class="brand-mark"></span>
                    <span>privbook</span>
                </a>
                <div class="header-actions">
                    <span class="header-greeting" id="greeting"></span>
                    <a class="btn btn-ghost btn-sm" href="/friends">Friends</a>
                    <button type="button" class="btn btn-ghost btn-sm" id="signout-btn">Sign out</button>
                </div>
            </div>
        </header>

        <main>
            <!-- Books strip -->
            <section class="books-strip" id="books-strip" aria-label="Books"></section>

            <!-- Composer -->
            <section class="composer" id="composer">
                <textarea id="post-body" placeholder="What's on your mind today?" rows="2"></textarea>

                <div class="composer-photos" id="composer-photos" hidden></div>

                <div class="composer-toolbar">
                    <div class="composer-toolbar-left">
                        <button type="button" class="icon-btn" id="add-photos-btn" title="Add photos">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="3" />
                                <circle cx="9" cy="9" r="1.6" />
                                <path d="M21 15l-5-5L5 21" />
                            </svg>
                            Photos
                        </button>
                        <select class="layout-select" id="layout-select" title="How to lay out multiple photos">
                            <option value="auto">Layout: auto</option>
                            <option value="grid">Grid</option>
                            <option value="collage">Collage</option>
                            <option value="single">Stack</option>
                        </select>
                        <span class="composer-date-wrap">
                            <button type="button" class="icon-btn" id="composer-date-btn" title="Set the date of this post">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="4" width="18" height="18" rx="3"/>
                                    <path d="M16 2v4M8 2v4M3 10h18"/>
                                </svg>
                                <span id="composer-date-label">Now</span>
                            </button>
                            <button type="button" class="icon-btn-clear" id="composer-date-clear" title="Reset to now" hidden aria-label="Reset to now">×</button>
                        </span>
                        <button type="button" class="icon-btn" id="composer-books-btn" title="Add this post to a book">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h11a3 3 0 0 1 3 3v13H7a3 3 0 0 1-3-3V4z"/>
                                <path d="M4 4v13a3 3 0 0 0 3 3"/>
                            </svg>
                            <span id="composer-books-label">Books</span>
                        </button>
                        <input type="file" id="photo-input" accept="image/*" multiple hidden />
                    </div>
                    <div class="composer-toolbar-right">
                        <span class="composer-status" id="composer-status"></span>
                        <button type="button" class="btn btn-primary btn-sm" id="post-btn" disabled>Post</button>
                    </div>
                </div>
            </section>

            <!-- Timeline -->
            <section class="timeline" id="timeline" aria-live="polite"></section>

            <div class="loading-row" id="load-more-row" hidden>
                <span class="spinner"></span>
                <span>loading more…</span>
            </div>
        </main>

        <footer class="site-footer">
            <p>privbook — a small private place.</p>
        </footer>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
        <button type="button" class="close" id="lightbox-close" aria-label="Close">×</button>
        <button type="button" class="lightbox-nav prev" id="lightbox-prev" aria-label="Previous image" hidden>‹</button>
        <button type="button" class="lightbox-nav next" id="lightbox-next" aria-label="Next image" hidden>›</button>
        <img id="lightbox-img" alt="" />
    </div>

    <div class="toast-stack" id="toast-stack"></div>
</body>

</html>
