<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friends · privbook</title>
    <link rel="icon" type="image/webp" href="/privbook_logo.webp">
    <link rel="apple-touch-icon" href="/privbook_logo.webp">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script type="text/javascript">
        window.__ENV__ = { CLERK_PUBLISHABLE_KEY: '{{CLERK_PUBLISHABLE_KEY}}', API_BASE: '{{API_BASE}}' };
    </script>
    <script async crossorigin="anonymous"
        data-clerk-publishable-key="{{CLERK_PUBLISHABLE_KEY}}"
        src="{{CLERK_JS_URL}}"
        type="text/javascript"></script>
    <script defer src="/js/toast.js"></script>
    <script defer src="/js/api.js"></script>
    <script defer src="/js/auth-guard.js"></script>
    <script defer src="/js/book-picker.js"></script>
    <script defer src="/js/share-modal.js"></script>
    <script defer src="/js/friends.js"></script>
</head>

<body>
    <div class="app-shell">
        <header class="site-header">
            <div class="site-header-inner">
                <a href="/timeline" class="brand" style="text-decoration: none;">
                    <span class="brand-mark"></span>
                    <span>privbook</span>
                </a>
                <div class="header-actions">
                    <a class="btn btn-ghost btn-sm" href="/timeline">Timeline</a>
                    <button type="button" class="btn btn-ghost btn-sm" id="signout-btn">Sign out</button>
                </div>
            </div>
        </header>

        <main>
            <section class="friends-hero">
                <h1 class="page-title">Friends</h1>
                <p class="page-sub">Share your timeline — all of it, or just a few books.</p>
                <button type="button" class="btn btn-primary" id="invite-btn">Invite a friend</button>
            </section>

            <section class="friends-section">
                <h2 class="section-title">Pending invites</h2>
                <div class="empty-state-soft" id="invites-empty" hidden>No pending invites.</div>
                <div class="friends-list" id="invites-list"></div>
            </section>

            <section class="friends-section">
                <h2 class="section-title">Friends viewing your privbook</h2>
                <div class="empty-state-soft" id="given-empty" hidden>No one has access yet.</div>
                <div class="friends-list" id="given-list"></div>
            </section>

            <section class="friends-section">
                <h2 class="section-title">Friends sharing with you</h2>
                <div class="empty-state-soft" id="received-empty" hidden>Nobody is sharing with you yet.</div>
                <div class="friends-list" id="received-list"></div>
            </section>
        </main>

        <footer class="site-footer">
            <p>privbook — a small private place.</p>
        </footer>
    </div>

    <div class="toast-stack" id="toast-stack"></div>
</body>

</html>
